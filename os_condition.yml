---
-  hosts: all
   become: true

   tasks:
   - name: Install Apache2 on ubuntu server
     apt: name:apache2 state=present
     when: ansible_os_family == "Debian"
     ignore_errors: true

  - name: Install httpd on Redhat server
    yum: name: httpd state=present
    when: ansible_os_family == "Redhat"
    ignore_errors: true
